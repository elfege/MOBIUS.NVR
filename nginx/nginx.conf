# nginx/nginx.conf
user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log notice;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    # access_log /var/log/nginx/access.log main;
    access_log off;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    gzip on;

 
    # --- added: HTTP -> HTTPS redirect for edge ---
    # Exception: /install-cert routes are proxied over HTTP so users can
    # download the CA certificate WITHOUT hitting the HTTPS trust warning.
    server {
        listen 80;
        server_name _;

        # Serve cert installation page and downloads over plain HTTP
        # (avoids chicken-and-egg: need cert to trust HTTPS, need HTTPS to get cert)
        location /install-cert {
            proxy_pass http://nvr:5000;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto http;
        }

        # Cert status API also available over HTTP
        location /api/cert/ {
            proxy_pass http://nvr:5000;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto http;
        }

        # Static assets needed by the cert install page (CSS, JS, images)
        location /static/ {
            proxy_pass http://nvr:5000;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
        }

        # Everything else redirects to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # --- added: HTTPS + HTTP/2 edge reverse proxy to Flask app ---
    server {
        listen 443 ssl http2;
        server_name _;

        # Local CA-signed certs (mounted from ./certs/dev)
        # Users install ca.pem to trust these — see /install-cert
        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;

        # Custom error pages for when backend is starting up or unavailable
        error_page 502 503 504 /custom_error.html;
        location = /custom_error.html {
            alias /usr/share/nginx/html/502.html;
        }

        # Intercept errors from backend so custom error pages work
        proxy_intercept_errors on;

        # inside the 443 server block, place this ABOVE the catch-all "/"
        location ^~ /streams {
            proxy_pass http://nvr:5000;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto https;

            # low-latency passthrough
            proxy_buffering off;
            proxy_request_buffering off;
            chunked_transfer_encoding on;
            tcp_nodelay on;

            add_header Access-Control-Allow-Origin "*" always;
            add_header Cache-Control "no-store";
            proxy_read_timeout 300;
        }

        # Proxy LL-HLS from MediaMTX packager
        location ^~ /hls/ {
            proxy_pass http://nvr-packager:8888/;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto https;

            gzip off;                              # do NOT compress LL-HLS playlists/parts
            proxy_set_header Accept-Encoding "";   # request uncompressed from upstream

            # low-latency passthrough
            proxy_buffering off;
            proxy_request_buffering off;
            chunked_transfer_encoding on;
            tcp_nodelay on;

            add_header Access-Control-Allow-Origin "*" always;
            add_header Cache-Control "no-store";
            proxy_read_timeout 300;
        }

        # Proxy WebRTC WHEP signaling from MediaMTX packager
        # This allows browser to access WHEP over HTTPS (avoiding mixed content issues)
        # Pattern: /webrtc/<camera_id>/whep -> nvr-packager:8889/<camera_id>/whep
        # NOTE: When DTLS is enabled in MediaMTX (webrtcEncryption: yes), the WHEP
        # endpoint requires HTTPS connections. We proxy HTTPS and skip cert verification
        # since MediaMTX uses a self-signed certificate.
        location ^~ /webrtc/ {
            # Strip /webrtc/ prefix and proxy to MediaMTX WebRTC port
            rewrite ^/webrtc/(.*)$ /$1 break;
            proxy_pass https://nvr-packager:8889;
            proxy_ssl_verify off;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto https;

            # WebRTC signaling needs low latency
            proxy_buffering off;
            proxy_request_buffering off;
            tcp_nodelay on;

            # CORS headers for WebRTC signaling
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type" always;

            # Handle OPTIONS preflight requests
            if ($request_method = OPTIONS) {
                return 204;
            }
        }

        # (Optional) keep legacy HLS on filesystem
        location ^~ /streams/ {
            alias /app/streams/;  
        }

        # Socket.IO WebSocket support for real-time events
        # Required for /stream_events and /mjpeg namespaces
        location ^~ /socket.io/ {
            proxy_pass http://nvr:5000;
            proxy_http_version 1.1;

            # WebSocket upgrade headers - REQUIRED for Socket.IO
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;

            # Long timeout for WebSocket connections
            proxy_read_timeout 86400;
            proxy_send_timeout 86400;

            # Disable buffering for real-time
            proxy_buffering off;
        }

        # catch-all app routes
        location / {
            proxy_pass http://nvr:5000;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto https;
            proxy_read_timeout 300;
        }

        # Silence access logs for the app's HLS API endpoint
        location ^~ /api/streams/ {
            access_log off;

            proxy_pass http://nvr:5000;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto https;
            proxy_read_timeout 300;

            # ↓ prevent "buffered to a temporary file …" warnings
            proxy_buffering off;
            proxy_request_buffering off;
            proxy_max_temp_file_size 0;
            chunked_transfer_encoding on;
            tcp_nodelay on;

            # (optional) keep these assets uncached by intermediaries
            add_header Cache-Control "no-store" always;
        }

        # Silence access logs for snapshot API (iOS polls every 1s per camera)
        location ^~ /api/snap/ {
            access_log off;

            proxy_pass http://nvr:5000;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto https;
            proxy_read_timeout 10;

            # Low latency for snapshots
            proxy_buffering off;
            tcp_nodelay on;
        }



    }

    # Include additional configuration files
    include /etc/nginx/conf.d/*.conf;
}