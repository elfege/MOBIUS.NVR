# Unified NVR Docker Compose
#
# Uses YAML anchors (&name) and aliases (*name) to avoid repeating credentials.
# All camera credentials are defined once in x-all-camera-credentials.

# ============================================================================
# Shared Environment Variables (YAML Anchors)
# ============================================================================

# All camera credentials - used by nvr service
x-all-camera-credentials: &all-camera-credentials
  # Reolink cameras
  NVR_REOLINK_USERNAME: ${NVR_REOLINK_USERNAME}
  NVR_REOLINK_PASSWORD: ${NVR_REOLINK_PASSWORD}
  NVR_REOLINK_API_USER: ${NVR_REOLINK_API_USER}
  NVR_REOLINK_API_PASSWORD: ${NVR_REOLINK_API_PASSWORD}
  # Amcrest cameras
  NVR_AMCREST_LOBBY_USERNAME: ${NVR_AMCREST_LOBBY_USERNAME}
  NVR_AMCREST_LOBBY_PASSWORD: ${NVR_AMCREST_LOBBY_PASSWORD}
  # SV3C cameras
  NVR_SV3C_USERNAME: ${NVR_SV3C_USERNAME}
  NVR_SV3C_PASSWORD: ${NVR_SV3C_PASSWORD}
  # Eufy cameras
  NVR_EUFY_CAMERA_T8416P0023352DA9_USERNAME: ${NVR_EUFY_CAMERA_T8416P0023352DA9_USERNAME}
  NVR_EUFY_CAMERA_T8416P0023352DA9_PASSWORD: ${NVR_EUFY_CAMERA_T8416P0023352DA9_PASSWORD}
  NVR_EUFY_CAMERA_T8416P0023370398_USERNAME: ${NVR_EUFY_CAMERA_T8416P0023370398_USERNAME}
  NVR_EUFY_CAMERA_T8416P0023370398_PASSWORD: ${NVR_EUFY_CAMERA_T8416P0023370398_PASSWORD}
  NVR_EUFY_CAMERA_T8416P00233717CB_USERNAME: ${NVR_EUFY_CAMERA_T8416P00233717CB_USERNAME}
  NVR_EUFY_CAMERA_T8416P00233717CB_PASSWORD: ${NVR_EUFY_CAMERA_T8416P00233717CB_PASSWORD}
  NVR_EUFY_CAMERA_T8416P0023390DE9_USERNAME: ${NVR_EUFY_CAMERA_T8416P0023390DE9_USERNAME}
  NVR_EUFY_CAMERA_T8416P0023390DE9_PASSWORD: ${NVR_EUFY_CAMERA_T8416P0023390DE9_PASSWORD}
  NVR_EUFY_CAMERA_T8416P6024350412_USERNAME: ${NVR_EUFY_CAMERA_T8416P6024350412_USERNAME}
  NVR_EUFY_CAMERA_T8416P6024350412_PASSWORD: ${NVR_EUFY_CAMERA_T8416P6024350412_PASSWORD}
  NVR_EUFY_CAMERA_T8419P0024110C6A_USERNAME: ${NVR_EUFY_CAMERA_T8419P0024110C6A_USERNAME}
  NVR_EUFY_CAMERA_T8419P0024110C6A_PASSWORD: ${NVR_EUFY_CAMERA_T8419P0024110C6A_PASSWORD}
  NVR_EUFY_CAMERA_T8441P12242302AC_USERNAME: ${NVR_EUFY_CAMERA_T8441P12242302AC_USERNAME}
  NVR_EUFY_CAMERA_T8441P12242302AC_PASSWORD: ${NVR_EUFY_CAMERA_T8441P12242302AC_PASSWORD}
  NVR_EUFY_CAMERA_T8441P122428038A_USERNAME: ${NVR_EUFY_CAMERA_T8441P122428038A_USERNAME}
  NVR_EUFY_CAMERA_T8441P122428038A_PASSWORD: ${NVR_EUFY_CAMERA_T8441P122428038A_PASSWORD}
  NVR_EUFY_CAMERA_T821451024233587_USERNAME: ${NVR_EUFY_CAMERA_T821451024233587_USERNAME}
  NVR_EUFY_CAMERA_T821451024233587_PASSWORD: ${NVR_EUFY_CAMERA_T821451024233587_PASSWORD}
  NVR_EUFY_BRIDGE_USERNAME: ${NVR_EUFY_BRIDGE_USERNAME}
  NVR_EUFY_BRIDGE_PASSWORD: ${NVR_EUFY_BRIDGE_PASSWORD}
  NVR_TRUSTED_DEVICE_NAME: ${NVR_TRUSTED_DEVICE_NAME}

# ============================================================================
# Services
# ============================================================================

services:
  nvr-edge:
    image: nginx:1.27-alpine
    container_name: nvr-edge
    restart: unless-stopped
    depends_on:
      - nvr
    ports:
      - "8081:80"  # HTTP -> 301 to HTTPS (edge only) # Internal nginx listens on 80, exposed as 8080
      - "8443:443"  # HTTPS + HTTP/2 (edge only)
    volumes:
      - ./certs/dev:/etc/nginx/certs:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/502.html:/usr/share/nginx/html/502.html:ro
    networks:
      - nvr-net

  nvr:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: unified-nvr
    ports:
      - "127.0.0.1:5000:5000"
      # Eufy P2P communication ports (UDP)
      - "32100:32100/udp"  # P2P data transfer
      - "32108:32108/udp"  # P2P discovery
    environment:
      # Merge all camera credentials from anchor
      <<: *all-camera-credentials
      # Python buffering disabled for real-time logging
      PYTHONUNBUFFERED: 1
      # UniFi Protect Configuration (loaded from host environment)
      NVR_PROTECT_HOST: ${NVR_PROTECT_HOST:-192.168.10.3}
      NVR_PROTECT_USERNAME: ${NVR_PROTECT_USERNAME}
      NVR_PROTECT_SERVER_PASSWORD: ${NVR_PROTECT_SERVER_PASSWORD}
      NVR_CAMERA_68d49398005cf203e400043f_TOKEN_ALIAS: ${NVR_CAMERA_68d49398005cf203e400043f_TOKEN_ALIAS}
      NVR_PROTECT_PORT: ${NVR_PROTECT_PORT}
      NVR_USE_EUFY_BRIDGE: ${NVR_USE_EUFY_BRIDGE}
      NVR_USE_EUFY_BRIDGE_WATCHDOG: ${NVR_USE_EUFY_BRIDGE_WATCHDOG}
      NVR_USE_PROTECT: ${NVR_USE_PROTECT}
      NVR_STREAM_WATCHDOG_ENABLED: ${NVR_STREAM_WATCHDOG_ENABLED}
      NVR_STREAM_WATCHDOG_INTERVAL_SEC: ${NVR_STREAM_WATCHDOG_INTERVAL_SEC:-300}
      NVR_STREAM_WATCHDOG_RESTART_LIMIT: ${NVR_STREAM_WATCHDOG_RESTART_LIMIT:-3}
      # Hubitat Power Control
      NVR_HUBITAT_API_TOKEN: ${NVR_HUBITAT_API_TOKEN}
      NVR_HUBITAT_API_APP_NUMBER: ${NVR_HUBITAT_API_APP_NUMBER}
      NVR_HUBITAT_HUB_IP: ${NVR_HUBITAT_HUB_IP:-hubitat.local}
      NVR_HUBITAT_API_TOKEN_4: ${NVR_HUBITAT_API_TOKEN_4:-}
      NVR_HUBITAT_API_NUMBER_4: ${NVR_HUBITAT_API_NUMBER_4:-}
      NVR_HUBITAT_HUB_IP_4: ${NVR_HUBITAT_HUB_IP_4:-hubitat.local}
      # UniFi POE Power Control (for POE-powered cameras)
      NVR_UNIFI_CONTROLLER_HOST: ${NVR_UNIFI_CONTROLLER_HOST}
      NVR_UNIFI_CONTROLLER_USERNAME: ${NVR_UNIFI_CONTROLLER_USERNAME}
      NVR_UNIFI_CONTROLLER_PASSWORD: ${NVR_UNIFI_CONTROLLER_PASSWORD}
      NVR_UNIFI_CONTROLLER_SITE: ${NVR_UNIFI_CONTROLLER_SITE:-default}
      NVR_UNIFI_CONTROLLER_TYPE: ${NVR_UNIFI_CONTROLLER_TYPE:-udm}
      # Flask Configuration
      FLASK_ENV: ${FLASK_ENV:-production}
      FLASK_DEBUG: ${FLASK_DEBUG:-0}
      NVR_SECRET_KEY: ${NVR_SECRET_KEY:-change-this-in-production}
      # External API authentication token (Bearer token for /api/external/* endpoints)
      # Loaded from AWS Secrets Manager via pull_nvr_secrets in start.sh
      # When empty, external API falls back to LAN-only IP check (dev mode)
      NVR_API_TOKEN: ${NVR_API_TOKEN:-}
      # Logging
      NVR_LOG_LEVEL: ${NVR_LOG_LEVEL:-INFO}
      # Stream Settings
      NVR_HLS_SEGMENT_TIME: ${NVR_HLS_SEGMENT_TIME:-4}
      NVR_HLS_MAX_SEGMENTS: ${NVR_HLS_MAX_SEGMENTS:-6}
      # HOST IP
      NVR_LOCAL_HOST_IP: ${NVR_LOCAL_HOST_IP:-192.168.10.20}
      # PostgreSQL Database Configuration
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: nvr
      POSTGRES_USER: nvr_api
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      NVR_POSTGREST_URL: http://postgrest:3001

    volumes:
      # Timezone - sync container time with host
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro

      # recording volumes

      # RECENT RECORDINGS
      - /mnt/sdc/NVR_Recent:/recordings

      # LONG TERM STORAGE
      - /mnt/THE_BIG_DRIVE/NVR_RECORDINGS:/recordings/STORAGE

      # ALTERNATE RECORDING SOURCE (FTP uploads from older surveillance system)
      - ${NVR_ALTERNATE_RECORDING_STORAGE:-/mnt/THE_BIG_DRIVE/VIDEOSURVEILLANCE_FTP}:/recordings/ALTERNATE

      # Mount Python source code for hot-reloading
      - ./:/app

    restart: unless-stopped

    depends_on:
      postgres:
        condition: service_healthy
      postgrest:
        condition: service_started

    networks:
      - nvr-net


    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

    # Resource limits (adjust based on camera count)
    deploy:
      resources:
        limits:
          cpus: '8.0'
          memory: 8G
        reservations:
          cpus: '4.0'
          memory: 2G

  packager:
    image: bluenviron/mediamtx:latest
    container_name: nvr-packager
    restart: unless-stopped
    networks:
      - nvr-net
    # we'll add a config file next step
    volumes:
      - ./packager/mediamtx.yml:/mediamtx.yml:ro
      - ./certs/dev:/certs:ro  # DTLS certificates for iOS WebRTC
    # expose only its HTTP port to nginx (no direct internet)
    ports:
      - "8888:8888"   # HTTP (HLS/LL-HLS)
      - "8889:8889"   # WebRTC WHEP signaling (HTTP)
      - "8189:8189/udp"  # WebRTC media (UDP)
    # leave RTSP/RTMP internal for now; we can open them later if needed
    # - "8554:8554"   # RTSP (optional)
    # - "1935:1935"   # RTMP (optional)
    environment:
    - NVR_REOLINK_USERNAME=${NVR_REOLINK_USERNAME}
    - NVR_REOLINK_PASSWORD=${NVR_REOLINK_PASSWORD}

  # go2rtc - ONVIF AudioBackChannel and WebRTC two-way audio
  # Used for cameras that support ONVIF backchannel (UniFi, Amcrest, SV3C, Reolink)
  # Flow 3: go2rtc handles backchannel, MediaMTX serves video to browser
  go2rtc:
    image: alexxit/go2rtc:latest
    container_name: nvr-go2rtc
    restart: unless-stopped
    volumes:
      - ./config/go2rtc.yaml:/config/go2rtc.yaml:ro
    ports:
      - "1984:1984"    # Web UI and API
      - "8555:8555"    # RTSP server (internal streams)
      - "8556:8556"    # WebRTC signaling (if needed later)
      - "8557:8557/udp"  # WebRTC media UDP
    environment:
      - TZ=America/New_York
      # Camera credentials for ONVIF backchannel
      - NVR_SV3C_PASSWORD=${NVR_SV3C_PASSWORD}
      - NVR_AMCREST_LOBBY_USERNAME=${NVR_AMCREST_LOBBY_USERNAME}
      - NVR_AMCREST_LOBBY_PASSWORD=${NVR_AMCREST_LOBBY_PASSWORD}
      # Reolink credentials (for LAUNDRY ROOM E1 Zoom ONVIF backchannel)
      - NVR_REOLINK_API_USER=${NVR_REOLINK_API_USER}
      - NVR_REOLINK_API_PASSWORD=${NVR_REOLINK_API_PASSWORD}
      # Eufy credentials (for P2P streaming via native go2rtc eufy support)
      - NVR_EUFY_BRIDGE_USERNAME=${NVR_EUFY_BRIDGE_USERNAME}
      - NVR_EUFY_BRIDGE_PASSWORD=${NVR_EUFY_BRIDGE_PASSWORD}
    networks:
      - nvr-net

  neolink:
    # Use v0.6.2 - v0.6.3.rc.x has buffer overflow regression
    # See: https://github.com/QuantumEntangledAndy/neolink/issues/349
    image: quantumentangledandy/neolink:v0.6.2
    container_name: nvr-neolink
    restart: unless-stopped
    volumes:
      - ./config/neolink.toml:/etc/neolink.toml:ro
    ports:
      - "8554:8554"  # RTSP - exposed for external testing (VLC)
    networks:
      - nvr-net

  postgres:
    image: postgres:16-alpine
    container_name: nvr-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: nvr
      POSTGRES_USER: nvr_api
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    volumes:
      - /mnt/sdc/postgres_data:/var/lib/postgresql/data
      - ./psql/init-db.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nvr_api -d nvr"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nvr-net

  postgrest:
    image: postgrest/postgrest:v12.0.2
    container_name: nvr-postgrest
    restart: unless-stopped
    environment:
      PGRST_DB_URI: postgres://nvr_api:${POSTGRES_PASSWORD}@postgres:5432/nvr
      PGRST_DB_SCHEMA: public
      PGRST_DB_ANON_ROLE: nvr_anon
      PGRST_DB_POOL: 10
      PGRST_SERVER_HOST: "*"
      PGRST_SERVER_PORT: 3001
      PGRST_OPENAPI_SERVER_PROXY_URI: http://localhost:3001
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - nvr-net

networks:
  nvr-net:
    driver: bridge
