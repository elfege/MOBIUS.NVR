  # =========================== Timeline ====================================

  /api/timeline/segments/{camera_id}:
    parameters:
      - { $ref: "#/components/parameters/CameraId" }
      - { name: start, in: query, required: true, schema: { type: string, format: date-time } }
      - { name: end,   in: query, required: true, schema: { type: string, format: date-time } }
    get:
      tags: [Timeline]
      summary: Recorded segments for a camera over a time window.
      responses:
        "200":
          description: Segment list.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/TimelineSegment" }

  /api/timeline/summary/{camera_id}:
    parameters:
      - { $ref: "#/components/parameters/CameraId" }
      - { name: start, in: query, required: true, schema: { type: string, format: date-time } }
      - { name: end,   in: query, required: true, schema: { type: string, format: date-time } }
    get:
      tags: [Timeline]
      summary: Aggregate counts/durations for a window.
      responses:
        "200":
          description: Summary blob.
          content:
            application/json:
              schema: { type: object, additionalProperties: true }

  /api/timeline/export:
    post:
      tags: [Timeline]
      summary: Queue a stitched export (motion + continuous merge).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [camera_id, start, end]
              properties:
                camera_id: { type: string }
                start:     { type: string, format: date-time }
                end:       { type: string, format: date-time }
      responses:
        "201":
          description: Export queued.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TimelineExport" }

  /api/timeline/export/{export_id}:
    parameters:
      - { name: export_id, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [Timeline]
      summary: Get export status.
      responses:
        "200":
          description: Export.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TimelineExport" }

  /api/timeline/export/{export_id}/start:
    parameters:
      - { name: export_id, in: path, required: true, schema: { type: string, format: uuid } }
    post:
      tags: [Timeline]
      summary: Begin processing a queued export.
      responses:
        "202":
          description: Started.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TimelineExport" }

  /api/timeline/export/{export_id}/cancel:
    parameters:
      - { name: export_id, in: path, required: true, schema: { type: string, format: uuid } }
    post:
      tags: [Timeline]
      summary: Cancel a running export.
      responses:
        "200":
          description: Cancelled.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TimelineExport" }

  /api/timeline/export/{export_id}/download:
    parameters:
      - { name: export_id, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [Timeline]
      summary: Download a finished export (full-file).
      responses:
        "200":
          description: Export bytes.
          content:
            video/mp4:
              schema: { type: string, format: binary }
            application/octet-stream:
              schema: { type: string, format: binary }

  /api/timeline/export/{export_id}/stream:
    parameters:
      - { name: export_id, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [Timeline]
      summary: Stream a finished export (range-request friendly).
      responses:
        "200":
          description: Stream bytes.
          content:
            video/mp4:
              schema: { type: string, format: binary }
        "206":
          description: Partial content.
          content:
            video/mp4:
              schema: { type: string, format: binary }

  /api/timeline/exports:
    get:
      tags: [Timeline]
      summary: List exports (current user's).
      responses:
        "200":
          description: Export list.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/TimelineExport" }

  /api/timeline/preview/{recording_id}:
    parameters:
      - { name: recording_id, in: path, required: true, schema: { type: integer, format: int64 } }
    get:
      tags: [Timeline]
      summary: In-place preview/playback of a single recording row.
      responses:
        "200":
          description: Stream bytes.
          content:
            video/mp4:
              schema: { type: string, format: binary }
        "206":
          description: Partial content.
          content:
            video/mp4:
              schema: { type: string, format: binary }

  /api/timeline/preview-merge:
    post:
      tags: [Timeline]
      summary: Queue a preview-merge (no fully-rendered file; on-the-fly stitch).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [camera_id, start, end]
              properties:
                camera_id: { type: string }
                start:     { type: string, format: date-time }
                end:       { type: string, format: date-time }
      responses:
        "201":
          description: Merge queued.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PreviewMerge" }

  /api/timeline/preview-merge/{merge_id}:
    parameters:
      - { name: merge_id, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [Timeline]
      summary: Get preview-merge status.
      responses:
        "200":
          description: Merge.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PreviewMerge" }

  /api/timeline/preview-merge/{merge_id}/cancel:
    parameters:
      - { name: merge_id, in: path, required: true, schema: { type: string, format: uuid } }
    post:
      tags: [Timeline]
      summary: Cancel a preview-merge.
      responses:
        "200":
          description: Cancelled.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PreviewMerge" }

  /api/timeline/preview-merge/{merge_id}/stream:
    parameters:
      - { name: merge_id, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [Timeline]
      summary: Stream the merged preview (range-request friendly).
      responses:
        "200":
          description: Stream bytes.
          content:
            video/mp4:
              schema: { type: string, format: binary }
        "206":
          description: Partial content.
          content:
            video/mp4:
              schema: { type: string, format: binary }

  /api/timeline/preview-merge/{merge_id}/cleanup:
    parameters:
      - { name: merge_id, in: path, required: true, schema: { type: string, format: uuid } }
    delete:
      tags: [Timeline]
      summary: Delete the merged preview's temp artefacts.
      responses:
        "204": { description: Cleaned. }

  /api/timeline/preview-merge/{merge_id}/promote:
    parameters:
      - { name: merge_id, in: path, required: true, schema: { type: string, format: uuid } }
    post:
      tags: [Timeline]
      summary: Promote a preview-merge into a permanent export.
      responses:
        "201":
          description: Promoted; returns the new export.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TimelineExport" }

  /api/timeline/export/download/{filename}:
    parameters:
      - { name: filename, in: path, required: true, schema: { type: string } }
    get:
      tags: [Timeline]
      summary: Direct download by filename (legacy alternative to export_id route).
      responses:
        "200":
          description: Bytes.
          content:
            video/mp4:
              schema: { type: string, format: binary }
            application/octet-stream:
              schema: { type: string, format: binary }

  /api/timeline/export/stream/{filename}:
    parameters:
      - { name: filename, in: path, required: true, schema: { type: string } }
    get:
      tags: [Timeline]
      summary: Direct stream by filename (legacy alternative to export_id route).
      responses:
        "200":
          description: Stream bytes.
          content:
            video/mp4:
              schema: { type: string, format: binary }
        "206":
          description: Partial content.
          content:
            video/mp4:
              schema: { type: string, format: binary }

