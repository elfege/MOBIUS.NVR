# nginx/nginx.conf
user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log notice;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    gzip on;

    # Upstream definitions for camera proxies
    upstream g5flex-1 {
        server g5flex-proxy:8080;
    }
    
    # upstream g5flex-2 {
    #     server g5flex-proxy-2:8080;
    # }

    # Default server block
    server {
        listen 81 default_server;
        server_name _;

        # Camera proxy routes
        location /camera1/ {
            proxy_pass http://g5flex-1/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Special handling for MJPEG streams
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # location /camera2/ {
        #     proxy_pass http://g5flex-2/;
        #     proxy_set_header Host $host;
        #     proxy_set_header X-Real-IP $remote_addr;
        #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        #     proxy_set_header X-Forwarded-Proto $scheme;
        #     
        #     proxy_buffering off;
        #     proxy_cache off;
        #     proxy_read_timeout 300s;
        #     proxy_send_timeout 300s;
        # }

        # Direct access to first camera (backward compatibility)
        location / {
            proxy_pass http://g5flex-1/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }
    }

    # Include additional configuration files
    include /etc/nginx/conf.d/*.conf;
}