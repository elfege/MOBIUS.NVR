# nginx/nginx.conf
user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log notice;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    # access_log /var/log/nginx/access.log main;
    access_log off;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    gzip on;

 
    # --- added: HTTP -> HTTPS redirect for edge ---
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # --- added: HTTPS + HTTP/2 edge reverse proxy to Flask app ---
    server {
        listen 443 ssl http2;
        server_name _;

        # self-signed/dev certs (mounted from ./certs/dev)
        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;

        # inside the 443 server block, place this ABOVE the catch-all "/"
        location ^~ /streams {
            proxy_pass http://nvr:5000;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto https;

            # low-latency passthrough
            proxy_buffering off;
            proxy_request_buffering off;
            chunked_transfer_encoding on;
            tcp_nodelay on;

            add_header Access-Control-Allow-Origin "*" always;
            add_header Cache-Control "no-store";
            proxy_read_timeout 300;
        }

        # Proxy LL-HLS from MediaMTX packager
        location ^~ /hls/ {
            proxy_pass http://nvr-packager:8888/;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto https;

            gzip off;                              # do NOT compress LL-HLS playlists/parts
            proxy_set_header Accept-Encoding "";   # request uncompressed from upstream

            # low-latency passthrough
            proxy_buffering off;
            proxy_request_buffering off;
            chunked_transfer_encoding on;
            tcp_nodelay on;

            add_header Access-Control-Allow-Origin "*" always;
            add_header Cache-Control "no-store";
            proxy_read_timeout 300;
        }

        # (Optional) keep legacy HLS on filesystem
        location ^~ /streams/ {
            alias /app/streams/;  
        }

        # catch-all app routes
        location / {
            proxy_pass http://nvr:5000;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto https;
            proxy_read_timeout 300;
        }

        # Silence access logs for the app's HLS API endpoint
        location ^~ /api/streams/ {
            access_log off;

            proxy_pass http://nvr:5000;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto https;
            proxy_read_timeout 300;

            # ↓ prevent “buffered to a temporary file …” warnings
            proxy_buffering off;
            proxy_request_buffering off;
            proxy_max_temp_file_size 0;
            chunked_transfer_encoding on;
            tcp_nodelay on;

            # (optional) keep these assets uncached by intermediaries
            add_header Cache-Control "no-store" always;
        }



    }

    # Include additional configuration files
    include /etc/nginx/conf.d/*.conf;
}