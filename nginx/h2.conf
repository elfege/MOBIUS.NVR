# nginx/h2.conf
# Purpose: terminate TLS, enable HTTP/2, and proxy to the existing Flask app.
# We do NOT change any Python, routes, or variable names.

worker_processes auto;

events { worker_connections 1024; }

http {
  # Basic sane defaults for many small files
  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  types_hash_max_size 4096;
  include       mime.types;
  default_type  application/octet-stream;

  # Gzip helps playlists and tiny JSON; harmless for fMP4 (it won’t compress)
  gzip on;
  gzip_types text/plain application/json application/javascript text/css application/xml;

  # Redirect plain HTTP to HTTPS (keeps host + URI)
  server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
  }

  # HTTPS + HTTP/2 listener
  server {
    listen 443 ssl http2;
    # adjust to  hostname/IP; wildcard is fine for LAN
    server_name _;

    # >>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>
    # TODO: point these to real certs.
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    # <<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<

    # Proxy to  Flask app (unchanged, still http/1.1 upstream)
    # If  app listens elsewhere, adjust the upstream URL ONLY here.
    location / {
      proxy_pass http://nvr-app:5000;
      proxy_http_version 1.1;       # upstream remains H1
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto https;
      proxy_read_timeout 300;
    }
  }
}
