          description: Started.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  /api/storage/cleanup:
    post:
      tags: [Storage, Maintenance]
      summary: Cleanup pass (delete orphans, prune by retention policy).
      responses:
        "202":
          description: Started.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  /api/storage/reconcile:
    post:
      tags: [Storage, Maintenance]
      summary: Reconcile DB rows against on-disk files.
      responses:
        "202":
          description: Started.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  /api/storage/operations:
    get:
      tags: [Storage]
      summary: List ongoing/recent storage operations.
      responses:
        "200":
          description: Operation list.
          content:
            application/json:
              schema:
                type: array
                items: { type: object, additionalProperties: true }

  /api/storage/cancel:
    post:
      tags: [Storage, Maintenance]
      summary: Cancel an in-flight storage operation.
      responses:
        "200":
          description: Cancelled.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  /api/storage/migration-status:
    get:
      tags: [Storage]
      summary: Migration progress snapshot.
      responses:
        "200":
          description: Status.
          content:
            application/json:
              schema: { type: object, additionalProperties: true }

  /api/storage/settings:
    get:
      tags: [Storage, Settings]
      summary: Storage settings (retention horizons, free-space floors).
      responses:
        "200":
          description: Settings blob.
          content:
            application/json:
              schema: { type: object, additionalProperties: true }
    post:
      tags: [Storage, Settings]
      summary: Update storage settings (admin only).
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, additionalProperties: true }
      responses:
        "200":
          description: Saved.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  # ============================ Motion =====================================

  /api/motion/status:
    get:
      tags: [Motion]
      summary: Motion-detection daemon status (across all cameras).
      responses:
        "200":
          description: Status.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MotionStatus" }

  /api/motion/start/{camera_id}:
    parameters: [{ $ref: "#/components/parameters/CameraId" }]
    post:
      tags: [Motion]
      summary: Start motion detection for a camera.
      responses:
        "200":
          description: Started.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  /api/motion/stop/{camera_id}:
    parameters: [{ $ref: "#/components/parameters/CameraId" }]
    post:
      tags: [Motion]
      summary: Stop motion detection for a camera.
      responses:
        "200":
          description: Stopped.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  # =========================== Presence ====================================

  /api/presence:
    get:
      tags: [Presence]
      summary: All persons + last-known presence state.
      responses:
        "200":
          description: Persons.
          content:
            application/json:
              schema:
                type: array
                items: { type: object, additionalProperties: true }

  /api/presence/{person_name}:
    parameters:
      - { name: person_name, in: path, required: true, schema: { type: string } }
    get:
      tags: [Presence]
      summary: Presence state for one person.
      responses:
        "200":
          description: Presence record.
          content:
            application/json:
              schema: { type: object, additionalProperties: true }

  /api/presence/{person_name}/toggle:
    parameters:
      - { name: person_name, in: path, required: true, schema: { type: string } }
    post:
      tags: [Presence]
      summary: Toggle presence (manual override).
      responses:
        "200":
          description: Toggled.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  /api/presence/{person_name}/set:
    parameters:
      - { name: person_name, in: path, required: true, schema: { type: string } }
    post:
      tags: [Presence]
      summary: Set presence (manual override).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [present]
              properties:
                present: { type: boolean }
      responses:
        "200":
          description: Saved.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  /api/presence/devices:
    get:
      tags: [Presence]
      summary: Devices currently used as presence indicators.
      responses:
        "200":
          description: Device list.
          content:
            application/json:
              schema:
                type: array
                items: { type: object, additionalProperties: true }

  /api/presence/{person_name}/device:
    parameters:
      - { name: person_name, in: path, required: true, schema: { type: string } }
    post:
      tags: [Presence]
      summary: Bind a device to a person for presence.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Bound.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  # ============================== Eufy =====================================

  /eufy-auth:
    get:
      tags: [Eufy, Pages]
      security: []
      summary: Eufy auth flow page (HTML; captcha + 2FA).
      responses:
        "200": { description: HTML. }

  /api/eufy-auth/captcha:
    post:
      tags: [Eufy]
      security: []
      summary: Submit Eufy captcha solution.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [captcha]
              properties:
                captcha: { type: string }
      responses:
        "200":
          description: Result.
          content:
            application/json:
              schema: { type: object, additionalProperties: true }

  /api/eufy-auth/2fa:
    post:
      tags: [Eufy]
      security: []
      summary: Submit Eufy 2FA code.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code: { type: string }
      responses:
        "200":
          description: Result.
          content:
            application/json:
              schema: { type: object, additionalProperties: true }

  /api/eufy-auth/status:
    get:
      tags: [Eufy]
      summary: Current Eufy auth state (logged in / awaiting captcha / awaiting 2FA / failed).
      responses:
        "200":
          description: Status.
          content:
            application/json:
              schema: { type: object, additionalProperties: true }

  /api/eufy-auth/captcha-image:
    get:
      tags: [Eufy]
      security: []
      summary: Current Eufy captcha image (PNG).
      responses:
        "200":
          description: Captcha PNG.
          content:
            image/png:
              schema: { type: string, format: binary }

  /api/eufy-auth/refresh-captcha:
    post:
      tags: [Eufy]
      security: []
      summary: Request a fresh captcha.
      responses:
        "200":
          description: Refreshed.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  # ============================ Evidence ===================================

  /api/evidence/disclosure-ack:
    post:
      tags: [Evidence]
      summary: Record user acknowledgement of jurisdiction-aware consent disclosure.
      description: Phase 4.5 of the evidence-collection plan. Records the
        per-jurisdiction disclosure the user must accept before evidence
        capture proceeds.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DisclosureAck" }
      responses:
        "200":
          description: Saved.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  /api/evidence/status:
    get:
      tags: [Evidence]
      summary: Evidence pipeline runtime status (free space, disclosure-ack, manifest tail).
      responses:
        "200":
          description: Status.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EvidenceStatus" }

  /api/evidence/feed:
    get:
      tags: [Evidence]
      summary: Recent classified audio events (paginated).
      parameters:
        - { name: limit,  in: query, schema: { type: integer, minimum: 1, maximum: 500, default: 50 } }
        - { name: cursor, in: query, schema: { type: string }, description: "Opaque pagination cursor." }
      responses:
        "200":
          description: Feed page.
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/EvidenceFeedItem" }
                  next_cursor: { type: string, nullable: true }

  /api/evidence/event/{manifest_id}:
    parameters:
      - { name: manifest_id, in: path, required: true, schema: { type: integer, format: int64 } }
    get:
      tags: [Evidence]
      summary: One audio event by manifest id.
      responses:
        "200":
          description: Event.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AudioEvent" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/evidence/manifest/verify:
    get:
      tags: [Evidence]
      summary: Verify manifest hash chain integrity.
      responses:
        "200":
          description: Verification result.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:    { type: boolean }
                  error: { type: string, nullable: true }

  /api/evidence/cases:
    get:
      tags: [Evidence]
      summary: List cases (current user's, plus shared).
      responses:
        "200":
          description: Case list.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/EvidenceCase" }
    post:
      tags: [Evidence]
      summary: Create a case.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/EvidenceCaseCreate" }
      responses:
        "201":
          description: Created.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EvidenceCase" }

  /api/evidence/cases/{case_id}:
    parameters:
      - { name: case_id, in: path, required: true, schema: { type: integer, format: int64 } }
    get:
      tags: [Evidence]
      summary: Get a case by id.
      responses:
        "200":
          description: Case.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EvidenceCase" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [Evidence]
      summary: Update / archive a case.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/EvidenceCasePatch" }
      responses:
        "200":
          description: Updated.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EvidenceCase" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/evidence/cases/{case_id}/events:
    parameters:
      - { name: case_id, in: path, required: true, schema: { type: integer, format: int64 } }
    get:
      tags: [Evidence]
      summary: List events bound to a case (paginated).
      parameters:
        - { name: limit,  in: query, schema: { type: integer, minimum: 1, maximum: 500, default: 50 } }
        - { name: cursor, in: query, schema: { type: string } }
      responses:
        "200":
          description: Bound events.
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/AudioEvent" }
                  next_cursor: { type: string, nullable: true }

  # ========================== Certificates =================================

  /install-cert:
    get:
      tags: [Certificates, Pages]
      security: []
      summary: Certificate install landing page (HTML).
      responses:
        "200": { description: HTML. }

  /install-cert/download:
    get:
      tags: [Certificates]
      security: []
      summary: Download root CA cert (PEM/DER).
      responses:
        "200":
          description: Certificate.
          content:
            application/x-x509-ca-cert:
              schema: { type: string, format: binary }
            application/octet-stream:
              schema: { type: string, format: binary }

  /install-cert/mobileconfig:
    get:
      tags: [Certificates]
      security: []
      summary: Download Apple `.mobileconfig` profile.
      responses:
        "200":
          description: Mobileconfig.
          content:
            application/x-apple-aspen-config:
              schema: { type: string, format: binary }

  /api/cert/status:
    get:
      tags: [Certificates]
      summary: Certificate status (CA fingerprint, expiry).
      responses:
        "200":
          description: Status.
          content:
            application/json:
              schema: { type: object, additionalProperties: true }
