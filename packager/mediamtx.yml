# MediaMTX config — LL-HLS sidecar
# We do NOT touch Flask/FFmpeg flow.
# This packager ingests RTSP directly from the camera and serves LL-HLS (with PARTs).

# === API Configuration ===
# Enables REST API for path/publisher state queries
# Used by CameraStateTracker to monitor publisher availability
api: yes
apiAddress: :9997

# === Authentication Configuration ===
# MediaMTX requires authentication for API access from non-localhost by default.
# Two-user setup: one for API access, one for anonymous streaming
authMethod: internal
authInternalUsers:
  # API access for CameraStateTracker (from Docker network)
  # path: "" = applies to all paths
  - user: nvr-api
    pass: ""
    ips: []
    permissions:
      - action: api
        path: ""
  # Anonymous access for HLS streaming (browsers) and RTSP publishing (FFmpeg)
  # path: "" = applies to all paths
  - user: any
    pass: ""
    ips: []
    permissions:
      - action: read
        path: ""
      - action: playback
        path: ""
      - action: publish
        path: ""

# === HLS/LL-HLS (HTTP) ===
hls: yes
hlsAddress: :8888
hlsVariant: lowLatency # emit #EXT-X-PART + PRELOAD-HINT
hlsSegmentCount: 7 # keep very small live window beware of: "ERR [HLS] [muxer REOLINK_OFFICE] Low-Latency HLS requires at least 7 segments"
#
# LATENCY TUNING NOTES (Jan 2026):
#
# WHY 200ms/100ms WORKED BEFORE (Oct 2025):
# Back then we used direct RTSP passthrough (copy codec) from cameras to MediaMTX.
# No transcoding = MediaMTX received pre-encoded H.264 frames directly from cameras.
# The muxer could easily keep up with 100ms part durations.
#
# WHY WE STOPPED USING DIRECT RTSP PASSTHROUGH:
# Budget cameras (Eufy, SV3C, some Reolink) only support ONE RTSP connection.
# With passthrough, each consumer (recordings, motion detection) opened its
# own RTSP connection → cameras dropped streams or refused connections entirely.
# Solution: Single FFmpeg process connects to camera, splits to sub/main streams,
# publishes both to MediaMTX. All consumers tap MediaMTX, not the camera directly.
#
# WHY 200ms/100ms FAILS NOW:
# We now transcode via FFmpeg for several reasons:
#   1. NEOLINK cameras: Baichuan→RTSP bridge requires re-encoding
#   2. Single-source architecture: FFmpeg splits sub/main streams to prevent
#      budget cameras from failing under multiple RTSP connections
#   3. Keyframe control: Force keyframes for reliable HLS segment boundaries
# The FFmpeg transcode pipeline adds ~200-500ms latency. With 100ms parts,
# MediaMTX HLS muxer times out waiting for segments → "muxer destroyed: terminated"
#
# FFMPEG GOP SIZE (-g) IMPACT ON LATENCY:
# In Oct 2025 with passthrough, we used -g 3 (keyframe every 3 frames) for low latency.
# With transcoding, -g 3 caused excessive CPU load and unstable segments.
# Current values: -g 15 for sub, -g 15 for main (keyframe every 1 second at 15fps).
# This adds ~1s to the latency floor but is required for stable transcoding.
# See streaming/ffmpeg_params.py for GOP configuration.
#
# CURRENT VALUES:
# - 500ms/250ms: Works with transcoded streams, ~2-4s latency
# - 1000ms/500ms: Very stable but 5-8s felt latency (unacceptable)
# - 200ms/100ms: Only works with direct RTSP passthrough (no transcode)
#
# For browser sub-second latency, WebRTC is now available (see webrtc settings below).
#
hlsSegmentDuration: 500ms
hlsPartDuration: 250ms # MUST be half of hlsSegmentDuration
hlsAllowOrigin: "*" # allow browser clients
hlsAlwaysRemux: yes # stable timing even if source timestamps wobble

# === WebRTC Configuration ===
# WebRTC provides sub-second latency (~200-500ms) by streaming directly to browser
# via peer-to-peer connection. Uses WHEP protocol for playback.
#
# HOW IT WORKS:
# 1. Browser creates RTCPeerConnection and sends SDP offer to /camera_id/whep
# 2. MediaMTX responds with SDP answer
# 3. ICE candidates are exchanged (via Trickle ICE or bundled)
# 4. Browser receives RTP media directly from MediaMTX
#
# LATENCY COMPARISON:
# - LL-HLS: 2-4 seconds (segment-based, HTTP)
# - WebRTC: 200-500ms (RTP-based, UDP preferred)
#
# TRADEOFFS:
# - WebRTC: Lower latency, but may struggle with NAT/firewall
# - LL-HLS: Higher latency, but works everywhere (HTTP)
#
# NAT TRAVERSAL:
# For LAN-only use (this NVR), STUN/TURN servers are not needed.
# ICE candidates use local IPs directly.
# If external access is needed later, add STUN server:
#   webrtcICEServers2: [{url: "stun:stun.l.google.com:19302"}]
#
webrtc: yes
webrtcAddress: :8889 # HTTP endpoint for WHEP signaling
webrtcEncryption: yes # Controlled by cameras.json webrtc_global_settings.enable_dtls
webrtcServerKey: /certs/privkey.pem
webrtcServerCert: /certs/fullchain.pem
webrtcAllowOrigin: "*" # Allow browser clients
webrtcTrustedProxies: []
webrtcICEServers2: [] # No STUN/TURN for LAN-only use
webrtcAdditionalHosts: [192.168.10.20] # Host IP for ICE candidates (Docker container can't auto-detect host network)
webrtcLocalUDPAddress: :8189 # UDP port for WebRTC media (required, replaces webrtcICEUDPMuxAddress)
webrtcLocalTCPAddress: "" # Disable TCP ICE (UDP preferred for latency)

# Make sure at least one ingest is enabled that matches the NVR publisher.
# If we publish RTMP from NVR:
rtmp: yes
rtmpAddress: :1935

# If we publish RTSP from NVR instead, ensure:
rtsp: yes
rtspAddress: :8554

# === TCP Buffer Management for Dual-Output Streams ===
# Dual-output FFmpeg publishes both sub and main streams constantly.
# When main stream is unconsumed (grid mode), TCP buffers fill up.
# These settings manage buffer overflow gracefully:
readTimeout: 30s # Close consumer if no data read for 30s
writeTimeout: 10m # Very long timeout - let writeQueueSize handle buffering instead
writeQueueSize: 8192 # Large write queue to absorb unconsumed main stream (allows ~8 seconds of buffering at 2Mbps)

