<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MOBIUS.NVR</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/the_eye.png') }}">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='images/the_eye.png') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/components/login.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-panel">
            <h1><img src="{{ url_for('static', filename='images/logo.svg') }}" alt="MOBIUS.NVR" class="login-logo"> MOBIUS.NVR</h1>
            <h2>Login</h2>

            {% if error %}
            <div class="error-message">{{ error }}</div>
            {% endif %}

            <form method="POST" action="/login">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required autofocus>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>

                <button type="submit" class="btn btn-primary">Login</button>
            </form>

            <div class="cert-install-link" style="margin-top: 1.5rem; text-align: center;">
                <a href="/install-cert" style="color: #4fc3f7; font-size: 0.85rem; text-decoration: none;">
                    <i class="fas fa-shield-alt" style="margin-right: 0.3rem;"></i>
                    Seeing security warnings? Install the NVR certificate
                </a>
            </div>
        </div>
    </div>


    <!-- Certificate install banner -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/components/cert-install.css') }}">
    <script src="{{ url_for('static', filename='js/cert-install.js') }}"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            if (window.CertInstall) {
                window.CertInstall.showBannerIfNeeded('.login-panel');
            }
        });
    </script>
</body>
</html>
