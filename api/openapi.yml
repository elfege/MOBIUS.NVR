  # ============================== PTZ ======================================

  /api/ptz/{camera_serial}/{direction}:
    parameters:
      - { $ref: "#/components/parameters/CameraSerial" }
      - { name: direction, in: path, required: true, schema: { $ref: "#/components/schemas/PtzDirection" } }
    post:
      tags: [PTZ]
      summary: Send a directional PTZ command.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                speed:    { type: integer, minimum: 0, maximum: 10 }
                duration: { type: number, description: "Seconds before auto-stop." }
      responses:
        "200":
          description: Dispatched.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  /api/ptz/{camera_serial}/presets:
    parameters: [{ $ref: "#/components/parameters/CameraSerial" }]
    get:
      tags: [PTZ]
      summary: List PTZ presets.
      responses:
        "200":
          description: Preset list.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/PtzPreset" }

  /api/ptz/{camera_serial}/preset:
    parameters: [{ $ref: "#/components/parameters/CameraSerial" }]
    post:
      tags: [PTZ]
      summary: Save a new preset at the camera's current position.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
      responses:
        "201":
          description: Created.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PtzPreset" }

  /api/ptz/{camera_serial}/preset/{preset_token}:
    parameters:
      - { $ref: "#/components/parameters/CameraSerial" }
      - { name: preset_token, in: path, required: true, schema: { type: string } }
    post:
      tags: [PTZ]
      summary: Recall a preset.
      responses:
        "200":
          description: Recalled.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }
    delete:
      tags: [PTZ]
      summary: Delete a preset.
      responses:
        "204": { description: Deleted. }

  /api/ptz/latency/{client_uuid}/{camera_serial}:
    parameters:
      - { name: client_uuid, in: path, required: true, schema: { type: string, format: uuid } }
      - { $ref: "#/components/parameters/CameraSerial" }
    get:
      tags: [PTZ]
      summary: Get current latency-calibration value for this client+camera.
      responses:
        "200":
          description: Latency record.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
    post:
      tags: [PTZ]
      summary: Submit a latency sample (frontend ⇄ camera ⇄ frontend roundtrip).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Recorded.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  /api/ptz/{camera_serial}/reversal:
    parameters: [{ $ref: "#/components/parameters/CameraSerial" }]
    get:
      tags: [PTZ]
      summary: Get axis-reversal setting (some cameras are inverted).
      responses:
        "200":
          description: Reversal blob.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
    post:
      tags: [PTZ]
      summary: Set axis-reversal flags.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                reverse_pan:  { type: boolean }
                reverse_tilt: { type: boolean }
                reverse_zoom: { type: boolean }
      responses:
        "200":
          description: Saved.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

