<!-- MOBIUS.NVR Logo - 2x2 Grid (matching MOBIUS.TILES brand) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Top-left tile - Blue -->
  <rect x="5" y="5" width="40" height="40" rx="4" fill="#4A9FD8"/>

  <!-- Top-right tile - Blue -->
  <rect x="55" y="5" width="40" height="40" rx="4" fill="#4A9FD8"/>

  <!-- Bottom-left tile - Blue -->
  <rect x="5" y="55" width="40" height="40" rx="4" fill="#4A9FD8"/>

  <!-- Bottom-right tile - Orange accent -->
  <rect x="55" y="55" width="40" height="40" rx="4" fill="#E89B3C"/>

  <!-- Camera lens icon (centered, white) -->
  <circle cx="50" cy="50" r="16" fill="none" stroke="white" stroke-width="2.5" opacity="0.9"/>
  <circle cx="50" cy="50" r="8" fill="white" opacity="0.9"/>
  <circle cx="50" cy="50" r="3" fill="none" stroke="rgba(74,159,216,0.8)" stroke-width="1.5"/>
</svg>
