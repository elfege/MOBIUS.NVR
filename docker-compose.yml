# Unified NVR Docker Compose
#
# Configuration:
#   .env          — Feature flags, ports, IPs (tracked in git)
#   secrets.env   — Passwords, tokens, credentials (gitignored, generated by start.sh)
#
# Camera credentials are stored in PostgreSQL (camera_credentials table).
# The secrets.env file is only needed for:
#   1. First-run migration (env vars -> DB)
#   2. Third-party containers (go2rtc, MediaMTX) that read creds from config files

# ============================================================================
# Services
# ============================================================================

services:
  nvr-edge:
    image: nginx:1.27-alpine
    container_name: nvr-edge
    restart: unless-stopped
    depends_on:
      - nvr
    ports:
      - "${NVR_EDGE_HTTP_PORT:-8081}:80"
      - "${NVR_EDGE_HTTPS_PORT:-8444}:443"
    volumes:
      - ./certs/dev:/etc/nginx/certs:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/502.html:/usr/share/nginx/html/502.html:ro
      - ./static:/usr/share/nginx/static:ro
    networks:
      - nvr-net

  nvr:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: unified-nvr
    ports:
      - "127.0.0.1:5000:5000"
      # Eufy P2P communication ports (UDP)
      - "32100:32100/udp"
      - "32108:32108/udp"
    env_file:
      # Optional: only needed for credential migration from env vars to DB.
      # Once all credentials are in the database, this file can be empty.
      - path: ./secrets.env
        required: false
    environment:
      # Python buffering disabled for real-time logging
      PYTHONUNBUFFERED: 1
      # Feature flags (from .env)
      NVR_USE_EUFY_BRIDGE: ${NVR_USE_EUFY_BRIDGE:-0}
      NVR_USE_EUFY_BRIDGE_WATCHDOG: ${NVR_USE_EUFY_BRIDGE_WATCHDOG:-0}
      NVR_USE_PROTECT: ${NVR_USE_PROTECT:-0}
      NVR_STREAM_WATCHDOG_ENABLED: ${NVR_STREAM_WATCHDOG_ENABLED:-0}
      NVR_STREAM_WATCHDOG_INTERVAL_SEC: ${NVR_STREAM_WATCHDOG_INTERVAL_SEC:-300}
      NVR_STREAM_WATCHDOG_RESTART_LIMIT: ${NVR_STREAM_WATCHDOG_RESTART_LIMIT:-3}
      # UniFi Protect host (not a secret — just network config)
      NVR_PROTECT_HOST: ${NVR_PROTECT_HOST:-192.168.10.3}
      NVR_PROTECT_PORT: ${NVR_PROTECT_PORT:-7447}
      # Hubitat Power Control
      NVR_HUBITAT_HUB_IP: ${NVR_HUBITAT_HUB_IP:-hubitat.local}
      NVR_HUBITAT_HUB_IP_4: ${NVR_HUBITAT_HUB_IP_4:-hubitat.local}
      # Flask Configuration
      FLASK_ENV: ${FLASK_ENV:-production}
      FLASK_DEBUG: ${FLASK_DEBUG:-0}
      # NVR_SECRET_KEY: auto-generated on first boot, stored in DB (nvr_settings table)
      # External API authentication token
      NVR_API_TOKEN: ${NVR_API_TOKEN:-}
      # Logging
      NVR_LOG_LEVEL: ${NVR_LOG_LEVEL:-INFO}
      # Stream Settings
      NVR_HLS_SEGMENT_TIME: ${NVR_HLS_SEGMENT_TIME:-4}
      NVR_HLS_MAX_SEGMENTS: ${NVR_HLS_MAX_SEGMENTS:-6}
      # Host IP (auto-detected by start.sh)
      NVR_LOCAL_HOST_IP: ${NVR_LOCAL_HOST_IP:-}
      # Admin console port (host systemd service for restart-from-UI)
      NVR_ADMIN_PORT: ${NVR_ADMIN_PORT:-9100}
      # PostgreSQL Database Configuration
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: nvr
      POSTGRES_USER: nvr_api
      POSTGRES_PASSWORD: nvr_internal_db_key
      NVR_POSTGREST_URL: http://postgrest:3001

    volumes:
      # Timezone - sync container time with host
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
      # Recording volumes (configure paths in .env)
      - ${NVR_RECORDING_PATH:-/mnt/sdc/NVR_Recent}:/recordings
      - ${NVR_STORAGE_PATH:-/mnt/THE_BIG_DRIVE/NVR_RECORDINGS}:/recordings/STORAGE
      - ${NVR_ALTERNATE_RECORDING_STORAGE:-/mnt/THE_BIG_DRIVE/VIDEOSURVEILLANCE_FTP}:/recordings/ALTERNATE
      # Mount Python source code for hot-reloading
      - ./:/app
      # Restart trigger — container writes "reboot" to trigger file,
      # host watcher service picks it up and runs start.sh
      - /dev/shm/nvr-restart:/dev/shm/nvr-restart

    restart: unless-stopped

    depends_on:
      postgres:
        condition: service_healthy
      postgrest:
        condition: service_started

    networks:
      - nvr-net

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

    # Resource limits (adjust based on camera count)
    deploy:
      resources:
        limits:
          cpus: '8.0'
          memory: 8G
        reservations:
          cpus: '4.0'
          memory: 2G

  packager:
    image: bluenviron/mediamtx:latest
    container_name: nvr-packager
    restart: unless-stopped
    networks:
      - nvr-net
    volumes:
      - ./packager/mediamtx.yml:/mediamtx.yml:ro
      - ./certs/dev:/certs:ro
    ports:
      - "8888:8888"   # HTTP (HLS/LL-HLS)
      - "8889:8889"   # WebRTC WHEP signaling (HTTP)
      - "8189:8189/udp"  # WebRTC media (UDP)
    env_file:
      # MediaMTX config may reference credential env vars
      - path: ./secrets.env
        required: false

  # go2rtc - ONVIF AudioBackChannel and WebRTC two-way audio
  go2rtc:
    image: alexxit/go2rtc:latest
    container_name: nvr-go2rtc
    restart: unless-stopped
    volumes:
      - /dev/shm/nvr-go2rtc:/config
    ports:
      - "1984:1984"    # Web UI and API
      - "8555:8555"    # RTSP server
      - "8557:8557/tcp"  # WebRTC signaling + media (TCP)
      - "8557:8557/udp"  # WebRTC media (UDP)
    env_file:
      # go2rtc.yaml uses ${NVR_*} env var interpolation for credentials
      - path: ./secrets.env
        required: false
    environment:
      - TZ=America/New_York
      - NVR_HOST_IP=${NVR_HOST_IP}
    networks:
      - nvr-net

  neolink:
    image: quantumentangledandy/neolink:v0.6.2
    container_name: nvr-neolink
    restart: unless-stopped
    volumes:
      - ./config/neolink.toml:/etc/neolink.toml:ro
    ports:
      - "8554:8554"  # RTSP
    networks:
      - nvr-net

  postgres:
    image: postgres:16-alpine
    container_name: nvr-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: nvr
      POSTGRES_USER: nvr_api
      POSTGRES_PASSWORD: nvr_internal_db_key
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    volumes:
      - ${NVR_POSTGRES_DATA:-/mnt/sdc/postgres_data}:/var/lib/postgresql/data
      - ./psql/init-db.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nvr_api -d nvr"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nvr-net

  postgrest:
    image: postgrest/postgrest:v12.0.2
    container_name: nvr-postgrest
    restart: unless-stopped
    environment:
      PGRST_DB_URI: postgres://nvr_api:nvr_internal_db_key@postgres:5432/nvr
      PGRST_DB_SCHEMA: public
      PGRST_DB_ANON_ROLE: nvr_anon
      PGRST_DB_POOL: 10
      PGRST_SERVER_HOST: "*"
      PGRST_SERVER_PORT: 3001
      PGRST_OPENAPI_SERVER_PROXY_URI: http://localhost:3001
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - nvr-net

networks:
  nvr-net:
    external: true
    name: ${NVR_NETWORK_NAME:-0_mobiusnvr_nvr-net}
