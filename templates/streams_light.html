<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOBIUS.NVR — Light</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/the_eye.png') }}">
    <link rel="apple-touch-icon" sizes="180x180" href="{{ url_for('static', filename='images/apple-touch-icon.png') }}">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="MOBIUS.NVR">

    <!--
        hls.js — needed only for real-fullscreen HD playback on browsers
        without native HLS support (Android Chrome / Firefox / desktop
        Chrome). iOS Safari plays HLS natively, so the script is a no-op
        there. Loaded synchronously because the fullscreen path is
        user-initiated and we want it ready by the time the user
        double-taps. This is the only external script in light mode —
        kept here, not in <script> at the bottom, so the network fetch
        starts as early as possible without blocking <body> render
        thanks to the CDN's HTTP/2 multiplexing.
    -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>

    <style>
        /* ===== Minimal inline CSS — no external sheets, no backdrop-filter, no animations ===== */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            height: 100%; overflow: hidden;
            background: #0a0a0a;
            color: #ccc;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        /* --- Full-viewport layout: topbar + grid + pagination, no scroll --- */
        body {
            display: flex; flex-direction: column;
        }

        /* --- Top bar --- */
        .topbar {
            flex-shrink: 0;
            height: 40px;
            background: #111;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 10px;
            border-bottom: 1px solid #222;
        }
        .topbar-title {
            font-size: 14px; font-weight: 600; color: #eee;
            display: flex; align-items: center; gap: 6px;
        }
        .topbar-title img { height: 22px; width: auto; }
        .topbar-actions { display: flex; gap: 8px; align-items: center; }
        .topbar-btn {
            background: none; border: 1px solid #333; color: #aaa;
            padding: 4px 10px; border-radius: 4px; font-size: 12px;
            cursor: pointer; white-space: nowrap;
        }
        .topbar-btn:active { background: #222; }
        .topbar-btn.active { color: #4caf50; border-color: #4caf50; }

        /* --- Grid: fills remaining space between topbar and pagination --- */
        /* Columns/rows set dynamically by JS (applyGridCSS) based on user's grid choice */
        .grid {
            flex: 1; min-height: 0;
            padding: 4px;
            display: grid;
            gap: 4px;
        }

        /* --- Camera tile: stretches to fill grid cell --- */
        .tile {
            position: relative;
            background: #111;
            border-radius: 4px;
            overflow: hidden;
            cursor: pointer;
            /* No aspect-ratio — grid rows size the tiles to fit viewport */
        }
        .tile img {
            width: 100%; height: 100%;
            /* object-fit set dynamically by JS (fitMode) */
            display: block;
        }
        .tile-label {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: rgba(0,0,0,0.65);
            color: #eee; font-size: 11px;
            padding: 3px 6px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .tile-error {
            position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
            color: #555; font-size: 12px;
        }

        /* --- Per-tile refresh button (top-right corner, fades in on hover/touch) --- */
        .tile-refresh {
            position: absolute; top: 6px; right: 6px;
            width: 30px; height: 30px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.55);
            border: 1px solid rgba(255, 255, 255, 0.25);
            color: #eee;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; line-height: 1;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.18s ease-out;
            z-index: 5;
            -webkit-user-select: none; user-select: none;
            padding: 0;
        }
        .tile.show-refresh .tile-refresh,
        .tile:hover .tile-refresh {
            opacity: 1;
        }
        .tile-refresh:active {
            background: rgba(76, 175, 80, 0.6);
        }
        .tile-refresh.spinning {
            animation: tile-refresh-spin 0.6s linear;
        }
        @keyframes tile-refresh-spin {
            from { transform: rotate(0deg); }
            to   { transform: rotate(360deg); }
        }

        /* ---- Stream modal (single camera, swipeable) ---- */
        .fs-backdrop {
            display: none;
            position: fixed; inset: 0; z-index: 290;
            background: rgba(0,0,0,0.75);
        }
        .fs-backdrop.active { display: block; }
        .fs-overlay {
            display: none;
            position: fixed; z-index: 300;
            top: 5vh; left: 4vw; right: 4vw; bottom: 5vh;
            background: #000;
            border-radius: 8px;
            flex-direction: column;
            overflow: hidden;
        }
        .fs-overlay.active { display: flex; }
        .fs-img,
        .fs-video {
            flex: 1; width: 100%; min-height: 0;
            /* object-fit set dynamically by JS (fitMode) */
            background: #000;
        }
        /* The two media elements live in the overlay simultaneously;
           JS toggles which is visible based on quality (SD = img,
           HD = video). Hidden one is fully removed from layout so
           it neither paints nor consumes flex space. */
        .fs-img.hidden,
        .fs-video.hidden { display: none; }

        /* SD/HD pill buttons in the fs-bar — small, finger-friendly. */
        .fs-quality {
            display: inline-flex;
            border: 1px solid #333;
            border-radius: 4px;
            overflow: hidden;
        }
        .fs-quality button {
            background: #1a1a1a;
            border: none;
            color: #aaa;
            font-size: 11px;
            padding: 4px 10px;
            cursor: pointer;
            min-width: 36px;
        }
        .fs-quality button.active {
            background: #2e7d32;
            color: #fff;
        }
        .fs-quality button:active { background: #333; }
        .fs-quality button.active:active { background: #1b5e20; }

        /* Real-fullscreen styling — when the overlay is the OS-level
           fullscreen element, drop the inset rounding and let it
           cover the whole viewport. The :fullscreen pseudo-class
           targets whichever element the browser put fullscreen. */
        .fs-overlay:fullscreen,
        .fs-overlay:-webkit-full-screen {
            top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 0;
        }
        .fs-bar {
            flex-shrink: 0;
            background: #111;
            display: flex; align-items: center; justify-content: space-between;
            padding: 6px 10px;
        }
        .fs-name { color: #eee; font-size: 13px; }
        .fs-counter { color: #888; font-size: 11px; }
        .fs-close {
            position: absolute; top: 6px; right: 6px; z-index: 310;
            background: rgba(0,0,0,0.6); border: none; color: #fff;
            width: 32px; height: 32px; border-radius: 50%;
            font-size: 16px; cursor: pointer; line-height: 32px; text-align: center;
        }
        .fs-close:active { background: rgba(255,255,255,0.2); }

        /* --- Pagination: compact, fixed at bottom --- */
        .pagination {
            flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            gap: 10px; padding: 6px 8px;
        }
        .page-btn {
            background: #1a1a1a; border: 1px solid #333; color: #ccc;
            padding: 6px 16px; border-radius: 4px; font-size: 13px;
            cursor: pointer; min-width: 70px; text-align: center;
        }
        .page-btn:active { background: #333; }
        .page-btn:disabled { opacity: 0.3; cursor: default; }
        .page-info { font-size: 13px; color: #888; }

        /* --- Landscape: tighter spacing --- */
        @media (orientation: landscape) {
            .topbar { height: 34px; }
            .topbar-title { font-size: 12px; }
            .topbar-btn { font-size: 11px; padding: 3px 8px; }
            .grid { gap: 3px; padding: 3px; }
            .pagination { padding: 4px 6px; }
            .page-btn { padding: 4px 12px; font-size: 12px; }
            .tile-label { font-size: 10px; padding: 2px 4px; }
        }

        /* No max-width — use ALL available space on every screen size */
    </style>
</head>
<body>

<!-- Top bar — minimal, no hamburger menus or modals -->
<div class="topbar">
    <div class="topbar-title">
        <img src="{{ url_for('static', filename='images/logo.svg') }}" alt="">
        NVR Light
    </div>
    <div class="topbar-actions">
        <button class="topbar-btn" id="grid-btn" title="Change grid size">2x2</button>
        <button class="topbar-btn" id="fit-btn" title="Toggle stretch / proportional">Stretch</button>
        <button class="topbar-btn" id="pause-btn" title="Pause snapshot refresh">Pause</button>
        <button class="topbar-btn" id="refresh-page-btn" title="Full page reload (clears caches, re-fetches all data)">↻</button>
        <a href="/streams?full=1" class="topbar-btn" title="Switch to full UI">Full UI</a>
        <form method="POST" action="/logout" style="margin:0;">
            <button type="submit" class="topbar-btn">Logout</button>
        </form>
    </div>
</div>

<!-- Camera grid — only the current page's 4 tiles are in DOM -->
<div class="grid" id="grid"></div>

<!-- Pagination -->
<div class="pagination" id="pagination">
    <button class="page-btn" id="prev-btn" disabled>&larr; Prev</button>
    <span class="page-info" id="page-info">1 / 1</span>
    <button class="page-btn" id="next-btn" disabled>Next &rarr;</button>
</div>

<!-- Stream modal — single camera, swipe left/right to navigate all cameras.
     The overlay supports two display modes:
       SD: snapshot polling (~2s, ~30 KB/req) into <img class="fs-img">
       HD: live HLS into <video class="fs-video"> via hls.js / native
     Only one is visible at a time. Toggle in the fs-bar. -->
<div class="fs-backdrop" id="fs-backdrop"></div>
<div class="fs-overlay" id="fs-overlay">
    <button class="fs-close" id="fs-close">&times;</button>
    <img class="fs-img" id="fs-img" alt="">
    <video class="fs-video hidden" id="fs-video"
           playsinline autoplay muted></video>
    <div class="fs-bar">
        <span class="fs-name" id="fs-name"></span>
        <span class="fs-quality" role="group" aria-label="Stream quality">
            <button type="button" id="fs-quality-sd" class="active"
                    title="Snapshot polling — low bandwidth">SD</button>
            <button type="button" id="fs-quality-hd"
                    title="Live HLS sub-stream">HD</button>
        </span>
        <span class="fs-counter" id="fs-counter"></span>
    </div>
</div>

<!--
    Camera list — server-rendered as JSON. The light-mode-app.js
    module reads it via $("#light-cameras").text() and JSON.parse,
    matching the pattern used in streams.html for ui-health.
-->
<script id="light-cameras" type="application/json">
    {{ cameras|tojson }}
</script>

<!--
    /light?fullscreen=<nickname|serial> — server resolved nickname to
    a canonical serial (or empty string if unknown). The light-mode-app
    init reads this and dispatches the same fullscreen-open path a tap
    on a tile would, so the localStorage-backed restore-on-reload still
    works for users who land here from an external bookmark or share.
-->
<script>
    window.FULLSCREEN_REQUEST = {{ (fullscreen_serial or '')|tojson }};
</script>

<!--
    jQuery — required by every ES6 frontend module per CLAUDE.md §3.10.5.
    Loaded synchronously before the module so the module body can use $.
-->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<!--
    Socket.IO client — only used to receive remote fullscreen-switch
    pushes from POST /api/fullscreen/switch (which emits the
    'fullscreen_request' event on /stream_events). One ws connection,
    one event. Tiny by /light standards; the benefit is real-time
    switching from external integrations.
-->
<script src="/socket.io/socket.io.js"></script>

<!--
    Application entry point — ES6 module that wires LightModeApp,
    LightGridRenderer, and LightFullscreenManager together. Replaces
    the prior inline IIFE (which violated §3.10.5: ES6 modules and
    jQuery style for frontend, always).
-->
<script type="module"
        src="{{ url_for("static", filename="js/light/light-mode-app.js") }}"></script>

<!-- Phase 2 audit outbox: same module used by /streams. Captures UI-only
     mutations on /light (grid size, fit mode, fullscreen open/close, etc.)
     and POSTs them to /api/audit/batch every 60s. -->
<script type="module">
    import { auditOutbox } from "{{ url_for('static', filename='js/services/audit-outbox.js') }}";
    auditOutbox.start();
    window.auditOutbox = auditOutbox;

    // 2026-05-13 UI interaction audit: same tracker as /streams. Captures
    // every click / keystroke / focus / submit / navigation on /light and
    // flushes through ui-event-outbox to POST /api/ui-event/batch (table:
    // ui_event_log). Password fields are masked client-side.
    import { uiEventOutbox } from "{{ url_for('static', filename='js/services/ui-event-outbox.js') }}";
    import { uiEventTracker } from "{{ url_for('static', filename='js/services/ui-event-tracker.js') }}";
    uiEventOutbox.start();
    uiEventTracker.start(uiEventOutbox);
    window.uiEventOutbox = uiEventOutbox;
</script>

</body>
</html>
