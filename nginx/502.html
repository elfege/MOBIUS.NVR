<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NVR Starting...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            padding: 2rem;
            max-width: 500px;
        }
        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top-color: #4a9eff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1.5rem;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        h1 {
            font-size: 1.5rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: #fff;
        }
        .silly-message {
            font-style: italic;
            color: #6a9eff;
            min-height: 1.5em;
            margin-bottom: 0.5rem;
            opacity: 1;
            transition: opacity 0.3s ease;
        }
        .silly-message.fade {
            opacity: 0;
        }
        .status {
            color: #888;
            margin-bottom: 1.5rem;
        }
        .countdown {
            display: inline-block;
            background: rgba(74, 158, 255, 0.2);
            color: #4a9eff;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }
        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            overflow: hidden;
            margin-top: 1rem;
        }
        .progress-fill {
            height: 100%;
            background: #4a9eff;
            width: 0%;
            transition: width 1s linear;
        }
        .retry-count {
            font-size: 0.8rem;
            color: #666;
            margin-top: 1rem;
        }
        .manual-retry {
            margin-top: 1.5rem;
        }
        .manual-retry button {
            background: transparent;
            border: 1px solid #4a9eff;
            color: #4a9eff;
            padding: 0.5rem 1.5rem;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        .manual-retry button:hover {
            background: #4a9eff;
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <h1>NVR is starting up...</h1>
        <p class="silly-message" id="silly">Waking up the cameras...</p>
        <p class="status">This usually takes 10-30 seconds.</p>
        <div class="countdown">Retrying in <span id="seconds">5</span>s</div>
        <div class="progress-bar">
            <div class="progress-fill" id="progress"></div>
        </div>
        <p class="retry-count">Attempt <span id="attempt">1</span></p>
        <div class="manual-retry">
            <button onclick="window.location.replace(window.location.pathname + '?_t=' + Date.now())">Retry Now</button>
        </div>
    </div>

    <script>
        (function() {
            // Silly loading messages - enough for 30+ seconds at 2s rotation
            const sillyMessages = [
                "Waking up the cameras...",
                "Brewing digital coffee...",
                "Convincing pixels to cooperate...",
                "Negotiating with RTSP streams...",
                "Polishing the lens caps...",
                "Teaching AI to count sheep...",
                "Untangling network cables...",
                "Asking MediaMTX nicely...",
                "Warming up the video buffers...",
                "Checking if anyone's home...",
                "Herding cat videos...",
                "Calibrating the flux capacitor...",
                "Feeding the hamsters that power the server...",
                "Reticulating splines...",
                "Consulting the camera gods...",
                "Bribing the firewall...",
                "Defragmenting the video streams...",
                "Locating the any key...",
                "Generating witty loading messages...",
                "Explaining to Docker what 'restart' means...",
                "Convincing containers to play nice...",
                "Teaching ONVIF the meaning of 'hurry'...",
                "Reminding cameras they have a job...",
                "Negotiating with stubborn processes...",
                "Loading the loading screen loader...",
                "Initializing the initializer...",
                "Starting the starter...",
                "Booting the bootstrap...",
                "Downloading more RAM (just kidding)...",
                "Dusting off the video codecs...",
                "Waking up the sleeping containers...",
                "Asking nicely for port 5000...",
                "Convincing Flask to flask...",
                "Teaching Python to slither faster...",
                "Buffering the buffer buffers...",
                "Streaming the stream streams...",
                "Pixelating the depixelator...",
                "Compressing the decompressor...",
                "Encoding the decoder...",
                "Decoding the encoder...",
                "Reversing the proxy...",
                "Proxying the reverse...",
                "Telling nginx to relax...",
                "Convincing SSL to certify things...",
                "Teaching HTTPS to be secure...",
                "Asking TCP to shake hands...",
                "Waiting for UDP to maybe show up...",
                "Pinging the unpingable...",
                "Routing the unroutable...",
                "Resolving DNS drama...",
                "Allocating all the allocations...",
                "Deallocating the deallocator...",
                "Garbage collecting the garbage collector...",
                "Threading the threadpool...",
                "Queueing the queue manager...",
                "Caching the cache keys...",
                "Invalidating the cache invalidator...",
                "Synchronizing the async functions...",
                "Making promises I can't keep...",
                "Rejecting promise rejections...",
                "Awaiting the awaiter...",
                "Timing out the timeout handler...",
                "Interrupting the interrupt handler...",
                "Signaling the signal handler...",
                "Locking the lock manager...",
                "Unlocking the unlock mechanism...",
                "Semaphoring the semaphore...",
                "Mutexing the mutex...",
                "Racing the race condition...",
                "Deadlocking the deadlock detector...",
                "Segfaulting the segfault handler...",
                "Debugging the debugger...",
                "Logging the logger...",
                "Monitoring the monitor...",
                "Watching the watcher...",
                "Observing the observer...",
                "Listening to the listener...",
                "Subscribing to the subscriber...",
                "Publishing to the publisher...",
                "Broadcasting the broadcaster...",
                "Multicasting to nobody...",
                "Unicasting the multicast...",
                "Handshaking with thin air...",
                "Acknowledging the acknowledgement...",
                "Retrying the retry mechanism...",
                "Backing off the backoff algorithm...",
                "Throttling the throttler...",
                "Debouncing the debouncer...",
                "Rate limiting the rate limiter...",
                "Circuit breaking the circuit breaker...",
                "Load balancing one server...",
                "Scaling horizontally on one machine...",
                "Microservicing the monolith...",
                "Dockerizing the Docker daemon...",
                "Virtualizing the virtual machine...",
                "Containerizing the container runtime...",
                "Orchestrating the orchestra...",
                "Kubernetes-ing without Kubernetes...",
                "Service meshing the mesh service...",
                "API gateway-ing the gateway API...",
                "Sidecar-ing the sidecar...",
                "Ingressing the ingress controller...",
                "Egressing the egress rules...",
                "Namespacing the namespace...",
                "Podding the pod scheduler...",
                "Almost there, probably...",
                "This time for real...",
                "Any moment now...",
                "Definitely happening soon...",
                "Just a few more seconds...",
                "I promise it's starting...",
                "Trust the process...",
                "Good things take time...",
                "Rome wasn't built in a day...",
                "Neither was this NVR...",
                "Still faster than watching paint dry...",
                "Still faster than waiting for Godot...",
                "At least we have silly messages...",
                "Could be worse...",
                "Could be better too...",
                "Such is life...",
                "The journey is the destination...",
                "Or is it the other way around?...",
                "Philosophizing about boot times...",
                "Contemplating existence...",
                "Questioning life choices...",
                "Wondering if it's worth it...",
                "Spoiler: it is...",
                "Your cameras will be back soon...",
                "Patience is a virtue...",
                "So is having a fast server...",
                "Working on that...",
                "Thanks for waiting...",
                "You're the best...",
                "Almost done, promise!"
            ];

            let messageIndex = 0;
            const sillyEl = document.getElementById('silly');

            // Rotate silly messages every 2 seconds with fade
            setInterval(() => {
                sillyEl.classList.add('fade');
                setTimeout(() => {
                    messageIndex = (messageIndex + 1) % sillyMessages.length;
                    sillyEl.textContent = sillyMessages[messageIndex];
                    sillyEl.classList.remove('fade');
                }, 300);
            }, 2000);

            // Get retry count from URL or start at 1
            const params = new URLSearchParams(window.location.search);
            let attempt = parseInt(params.get('attempt')) || 1;
            document.getElementById('attempt').textContent = attempt;

            // Countdown timer
            const totalSeconds = 5;
            let seconds = totalSeconds;
            const countdownEl = document.getElementById('seconds');
            const progressEl = document.getElementById('progress');

            // Update progress bar with countdown
            const updateProgress = () => {
                const progress = ((totalSeconds - seconds) / totalSeconds) * 100;
                progressEl.style.width = progress + '%';
            };

            // Start with 0% progress
            updateProgress();

            const timer = setInterval(() => {
                seconds--;
                countdownEl.textContent = seconds;
                updateProgress();
                if (seconds <= 0) {
                    clearInterval(timer);
                    // Increment attempt and reload
                    const newUrl = new URL(window.location.href);
                    newUrl.searchParams.set('attempt', attempt + 1);
                    // Remove attempt param from final URL to keep it clean on success
                    window.location.href = newUrl.pathname + '?attempt=' + (attempt + 1);
                }
            }, 1000);

            // Background health check - polls every 2 seconds
            // iOS Safari requires cache: 'no-store' to prevent cached responses
            const healthCheck = setInterval(() => {
                fetch('/api/status', { method: 'GET', cache: 'no-store' })
                    .then(r => {
                        if (r.ok) {
                            // App is up - redirect to /streams with cache-busting
                            // Always go to /streams directly to avoid iOS caching issues
                            // with error pages served at other paths
                            clearInterval(healthCheck);
                            window.location.replace('/streams?_t=' + Date.now());
                        }
                    })
                    .catch(() => {});
            }, 2000);
        })();
    </script>
</body>
</html>
