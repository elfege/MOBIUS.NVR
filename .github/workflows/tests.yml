# ─────────────────────────────────────────────────────────────────────
# tests.yml — run the pytest suite on every push + PR.
#
# Scope is intentionally narrow: this only runs the in-tree `tests/`
# suite that doesn't need a running Postgres / Docker stack. The audit-
# coverage test (the original reason this workflow exists) parses
# migration SQL as text, so no service containers are needed.
#
# Heavier integration tests that need a real DB belong on a separate
# workflow with `services: postgres: ...` — out of scope for now.
# ─────────────────────────────────────────────────────────────────────
name: Tests

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  unit:
    name: Unit + schema tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Run pytest
        run: pytest tests/ -v --tb=short
