# Unified NVR Docker Compose

services:
  nvr-edge:
    image: nginx:1.27-alpine
    container_name: nvr-edge
    restart: unless-stopped
    depends_on:
      - nvr                
    ports:
      - "8081:80"  # HTTP -> 301 to HTTPS (edge only) # Internal nginx listens on 80, exposed as 8080
      - "8443:443"  # HTTPS + HTTP/2 (edge only)
    volumes:
      - ./certs/dev:/etc/nginx/certs:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/502.html:/usr/share/nginx/html/502.html:ro
    networks:
      - nvr-net

  nvr:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: unified-nvr
    ports:
      - "127.0.0.1:5000:5000"
      # Eufy P2P communication ports (UDP)
      - "32100:32100/udp"  # P2P data transfer
      - "32108:32108/udp"  # P2P discovery
    environment:
      # Python buffering disabled for real-time logging
      - PYTHONUNBUFFERED=1
      # UniFi Protect Configuration (loaded from host environment)
      - PROTECT_HOST=${PROTECT_HOST:-192.168.10.3}
      - PROTECT_USERNAME=${PROTECT_USERNAME}
      - PROTECT_SERVER_PASSWORD=${PROTECT_SERVER_PASSWORD}
      - CAMERA_68d49398005cf203e400043f_TOKEN_ALIAS=${CAMERA_68d49398005cf203e400043f_TOKEN_ALIAS}
      - PROTECT_PORT=${PROTECT_PORT}
      - USE_EUFY_BRIDGE=${USE_EUFY_BRIDGE}
      - USE_EUFY_BRIDGE_WATCHDOG=${USE_EUFY_BRIDGE_WATCHDOG}
      - USE_PROTECT=${USE_PROTECT}
      - REOLINK_USERNAME=${REOLINK_USERNAME}
      - REOLINK_PASSWORD=${REOLINK_PASSWORD}
      - REOLINK_API_USER=${REOLINK_API_USER}
      - REOLINK_API_PASSWORD=${REOLINK_API_PASSWORD}
      - AMCREST_LOBBY_USERNAME=${AMCREST_LOBBY_USERNAME}
      - AMCREST_LOBBY_PASSWORD=${AMCREST_LOBBY_PASSWORD}
      - SV3C_USERNAME=${SV3C_USERNAME}
      - SV3C_PASSWORD=${SV3C_PASSWORD}
      - EUFY_CAMERA_T8416P0023352DA9_USERNAME=${EUFY_CAMERA_T8416P0023352DA9_USERNAME}
      - EUFY_CAMERA_T8416P0023352DA9_PASSWORD=${EUFY_CAMERA_T8416P0023352DA9_PASSWORD}
      - EUFY_CAMERA_T8416P0023370398_USERNAME=${EUFY_CAMERA_T8416P0023370398_USERNAME}
      - EUFY_CAMERA_T8416P0023370398_PASSWORD=${EUFY_CAMERA_T8416P0023370398_PASSWORD}
      - EUFY_CAMERA_T8416P00233717CB_USERNAME=${EUFY_CAMERA_T8416P00233717CB_USERNAME}
      - EUFY_CAMERA_T8416P00233717CB_PASSWORD=${EUFY_CAMERA_T8416P00233717CB_PASSWORD}
      - EUFY_CAMERA_T8416P0023390DE9_USERNAME=${EUFY_CAMERA_T8416P0023390DE9_USERNAME}
      - EUFY_CAMERA_T8416P0023390DE9_PASSWORD=${EUFY_CAMERA_T8416P0023390DE9_PASSWORD}
      - EUFY_CAMERA_T8416P6024350412_USERNAME=${EUFY_CAMERA_T8416P6024350412_USERNAME}
      - EUFY_CAMERA_T8416P6024350412_PASSWORD=${EUFY_CAMERA_T8416P6024350412_PASSWORD}
      - EUFY_CAMERA_T8419P0024110C6A_USERNAME=${EUFY_CAMERA_T8419P0024110C6A_USERNAME}
      - EUFY_CAMERA_T8419P0024110C6A_PASSWORD=${EUFY_CAMERA_T8419P0024110C6A_PASSWORD}
      - EUFY_CAMERA_T8441P12242302AC_USERNAME=${EUFY_CAMERA_T8441P12242302AC_USERNAME}
      - EUFY_CAMERA_T8441P12242302AC_PASSWORD=${EUFY_CAMERA_T8441P12242302AC_PASSWORD}
      - EUFY_CAMERA_T8441P122428038A_USERNAME=${EUFY_CAMERA_T8441P122428038A_USERNAME}
      - EUFY_CAMERA_T8441P122428038A_PASSWORD=${EUFY_CAMERA_T8441P122428038A_PASSWORD}
      - EUFY_CAMERA_T821451024233587_USERNAME=${EUFY_CAMERA_T821451024233587_USERNAME}
      - EUFY_CAMERA_T821451024233587_PASSWORD=${EUFY_CAMERA_T821451024233587_PASSWORD}
      - EUFY_BRIDGE_USERNAME=${EUFY_BRIDGE_USERNAME}
      - EUFY_BRIDGE_PASSWORD=${EUFY_BRIDGE_PASSWORD}
      - TRUSTED_DEVICE_NAME=${TRUSTED_DEVICE_NAME:-EufyBridge}

      - STREAM_WATCHDOG_ENABLED=${STREAM_WATCHDOG_ENABLED}

      # Flask Configuration
      - FLASK_ENV=${FLASK_ENV:-production}
      - FLASK_DEBUG=${FLASK_DEBUG:-0}
      - SECRET_KEY=${SECRET_KEY:-change-this-in-production}

      # Logging
      - LOG_LEVEL=${LOG_LEVEL:-INFO}

      # Stream Settings
      - HLS_SEGMENT_TIME=${HLS_SEGMENT_TIME:-4}
      - HLS_MAX_SEGMENTS=${HLS_MAX_SEGMENTS:-6}

      # HOST IP
      - LOCAL_HOST_IP=${LOCAL_HOST_IP:-192.168.10.20}

      # PostgreSQL Database Configuration
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=nvr
      - POSTGRES_USER=nvr_api
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGREST_URL=http://postgrest:3001

    volumes:
      # Timezone - sync container time with host
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro

      # recording volumes

      # RECENT RECORDINGS
      - /mnt/sdc/NVR_Recent/motion:/recordings/motion
      - /mnt/sdc/NVR_Recent/continuous:/recordings/continuous
      - /mnt/sdc/NVR_Recent/snapshots:/recordings/snapshots
      - /mnt/sdc/NVR_Recent/manual:/recordings/manual
      - /mnt/sdc/NVR_Recent/buffer:/recordings/buffer
      - /mnt/sdc/NVR_Recent/exports:/recordings/exports

      # LONG TERM STORAGE
      - /mnt/THE_BIG_DRIVE/NVR_RECORDINGS/motion:/recordings/STORAGE/motion
      - /mnt/THE_BIG_DRIVE/NVR_RECORDINGS/continuous:/recordings/STORAGE/continuous
      - /mnt/THE_BIG_DRIVE/NVR_RECORDINGS/manual:/recordings/STORAGE/manual
      - /mnt/THE_BIG_DRIVE/NVR_RECORDINGS/snapshots:/recordings/STORAGE/snapshots

      # Mount Python source code for hot-reloading
      - ./:/app
      # - ./streaming:/app/streaming
      # - ./services:/app/services  
      # - ./packager/mediamtx.yml:/app/packager/mediamtx.yml
      # - ./config:/app/config:rw
      # - ./streams:/app/streams
      # - ./app.py:/app/app.py:ro
      # - ./requirements.txt:/app/requirements.txt:ro
      # - ./templates:/app/templates:ro
      # - ./static:/app/static:ro

      # # Node modules for Eufy bridge
      # - ./node_modules:/app/node_modules:ro

      # # static for fast ui editting/testing
      # - ./static:/app/static

      # Persist auth tokens
      # - ./persistent.json:/app/persistent.json
      
    restart: unless-stopped

    depends_on:
      postgres:
        condition: service_healthy
      postgrest:
        condition: service_started

    networks:
      - nvr-net


    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

    # Resource limits (adjust based on camera count)
    deploy:
      resources:
        limits:
          cpus: '8.0'
          memory: 8G
        reservations:
          cpus: '4.0'
          memory: 2G

  packager:
    image: bluenviron/mediamtx:latest
    container_name: nvr-packager
    restart: unless-stopped
    networks:
      - nvr-net
    # weâ€™ll add a config file next step
    volumes:
      - ./packager/mediamtx.yml:/mediamtx.yml:ro
      - ./certs/dev:/certs:ro  # DTLS certificates for iOS WebRTC
    # expose only its HTTP port to nginx (no direct internet)
    ports:
      - "8888:8888"   # HTTP (HLS/LL-HLS)
      - "8889:8889"   # WebRTC WHEP signaling (HTTP)
      - "8189:8189/udp"  # WebRTC media (UDP)
    # leave RTSP/RTMP internal for now; we can open them later if needed
    # - "8554:8554"   # RTSP (optional)
    # - "1935:1935"   # RTMP (optional)
    environment:
    - REOLINK_USERNAME=${REOLINK_USERNAME}
    - REOLINK_PASSWORD=${REOLINK_PASSWORD}

  neolink:
    # Use v0.6.2 - v0.6.3.rc.x has buffer overflow regression
    # See: https://github.com/QuantumEntangledAndy/neolink/issues/349
    image: quantumentangledandy/neolink:v0.6.2
    container_name: nvr-neolink
    restart: unless-stopped
    volumes:
      - ./config/neolink.toml:/etc/neolink.toml:ro
    ports:
      - "8554:8554"  # RTSP - exposed for external testing (VLC)
    networks:
      - nvr-net

  postgres:
    image: postgres:16-alpine
    container_name: nvr-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: nvr
      POSTGRES_USER: nvr_api
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    volumes:
      - /mnt/sdc/postgres_data:/var/lib/postgresql/data
      - ./psql/init-db.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nvr_api -d nvr"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nvr-net

  postgrest:
    image: postgrest/postgrest:v12.0.2
    container_name: nvr-postgrest
    restart: unless-stopped
    environment:
      PGRST_DB_URI: postgres://nvr_api:${POSTGRES_PASSWORD}@postgres:5432/nvr
      PGRST_DB_SCHEMA: public
      PGRST_DB_ANON_ROLE: nvr_anon
      PGRST_DB_POOL: 10
      PGRST_SERVER_HOST: "*"
      PGRST_SERVER_PORT: 3001
      PGRST_OPENAPI_SERVER_PROXY_URI: http://localhost:3001
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - nvr-net
    
networks:
  nvr-net:
    driver: bridge