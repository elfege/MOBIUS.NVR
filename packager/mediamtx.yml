# MediaMTX config — LL-HLS sidecar
# We do NOT touch Flask/FFmpeg flow.
# This packager ingests RTSP directly from the camera and serves LL-HLS (with PARTs).

# === API Configuration ===
# Enables REST API for path/publisher state queries
# Used by CameraStateTracker to monitor publisher availability
api: yes
apiAddress: :9997

# === Authentication Configuration ===
# MediaMTX requires authentication for API access from non-localhost by default.
# Two-user setup: one for API access, one for anonymous streaming
authMethod: internal
authInternalUsers:
  # API access for CameraStateTracker (from Docker network)
  # path: "" = applies to all paths
  - user: nvr-api
    pass: ""
    ips: []
    permissions:
      - action: api
        path: ""
  # Anonymous access for HLS streaming (browsers) and RTSP publishing (FFmpeg)
  # path: "" = applies to all paths
  - user: any
    pass: ""
    ips: []
    permissions:
      - action: read
        path: ""
      - action: playback
        path: ""
      - action: publish
        path: ""

# === HLS/LL-HLS (HTTP) ===
hls: yes
hlsAddress: :8888
hlsVariant: lowLatency          # emit #EXT-X-PART + PRELOAD-HINT
hlsSegmentCount: 7              # keep very small live window beware of: "ERR [HLS] [muxer REOLINK_OFFICE] Low-Latency HLS requires at least 7 segments"
#
# LATENCY TUNING NOTES (Jan 2026):
#
# WHY 200ms/100ms WORKED BEFORE (Oct 2025):
# Back then we used direct RTSP passthrough (copy codec) from cameras to MediaMTX.
# No transcoding = MediaMTX received pre-encoded H.264 frames directly from cameras.
# The muxer could easily keep up with 100ms part durations.
#
# WHY 200ms/100ms FAILS NOW:
# We now transcode via FFmpeg for several reasons:
#   1. NEOLINK cameras: Baichuan→RTSP bridge requires re-encoding
#   2. Single-source architecture: FFmpeg splits sub/main streams to prevent
#      budget cameras from failing under multiple RTSP connections
#   3. Keyframe control: Force keyframes for reliable HLS segment boundaries
# The FFmpeg transcode pipeline adds ~200-500ms latency. With 100ms parts,
# MediaMTX HLS muxer times out waiting for segments → "muxer destroyed: terminated"
#
# CURRENT VALUES:
# - 500ms/250ms: Works with transcoded streams, ~2-4s latency
# - 1000ms/500ms: Very stable but 5-8s felt latency (unacceptable)
# - 200ms/100ms: Only works with direct RTSP passthrough (no transcode)
#
# For browser sub-second latency, WebRTC would be needed (future enhancement).
#
hlsSegmentDuration: 500ms
hlsPartDuration: 250ms          # MUST be half of hlsSegmentDuration
hlsAllowOrigin: "*"             # allow browser clients
hlsAlwaysRemux: yes             # stable timing even if source timestamps wobble

# Make sure at least one ingest is enabled that matches the NVR publisher.
# If we publish RTMP from NVR:
rtmp: yes
rtmpAddress: :1935

# If we publish RTSP from NVR instead, ensure:
rtsp: yes
rtspAddress: :8554

# === TCP Buffer Management for Dual-Output Streams ===
# Dual-output FFmpeg publishes both sub and main streams constantly.
# When main stream is unconsumed (grid mode), TCP buffers fill up.
# These settings manage buffer overflow gracefully:
readTimeout: 30s           # Close consumer if no data read for 30s
writeTimeout: 10m          # Very long timeout - let writeQueueSize handle buffering instead
writeQueueSize: 8192       # Large write queue to absorb unconsumed main stream (allows ~8 seconds of buffering at 2Mbps)

